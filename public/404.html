<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Valtoris International Trading Inc.</title>
    <!--
      GitHub Pages doesn't know about SPA routes. When a visitor lands on
      /about-us directly, Pages serves this 404.html. We encode the path into
      the query string and redirect to index.html — the tiny script in
      index.html then decodes it back to the real URL before React Router
      takes over. Based on the spa-github-pages pattern by rafgraph.
    -->
    <script>
      (function () {
        // Number of path segments belonging to the GH Pages repo prefix.
        // For https://artofspeed.github.io/valtoris-international/ → 1.
        // Set to 0 when deployed at a custom domain apex.
        var segmentCount = 1;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }());
    </script>
  </head>
  <body></body>
</html>
